name: Publish verified Latitude AI candidate campaign

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-campaign.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: latitude-campaign-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install document tooling
        run: python -m pip install --upgrade pillow pypdf weasyprint

      - name: Restore verified campaign source
        shell: bash
        run: |
          cat payload/part-* | base64 --decode > /tmp/latitude-campaign.tgz
          tar -xzf /tmp/latitude-campaign.tgz -C "$GITHUB_WORKSPACE"

      - name: Fetch and optimize official Latitude assets
        shell: bash
        run: |
          mkdir -p assets/brand
          curl --fail --location --retry 3 --output /tmp/latitude-logo.png https://lat.ai/images/brand/latitude-title-logo.png
          curl --fail --location --retry 3 --output /tmp/work-at-latitude.jpg https://lat.ai/_next/static/media/work-at-latitude.22fcedb0.jpg
          python - <<'PY'
          from PIL import Image

          with Image.open('/tmp/latitude-logo.png') as image:
              logo = image.convert('RGBA')
              logo.thumbnail((1200, 1200), Image.Resampling.LANCZOS)
              logo.save('assets/brand/latitude-title-logo.png', optimize=True)

          with Image.open('/tmp/work-at-latitude.jpg') as image:
              photo = image.convert('RGB')
              photo.thumbnail((1800, 1800), Image.Resampling.LANCZOS)
              photo.save('assets/brand/work-at-latitude.jpg', quality=88, optimize=True, progressive=True)
          PY

      - name: Generate committed PDFs
        shell: bash
        run: |
          mkdir -p docs
          weasyprint resume.html docs/Russell-Dudek-Latitude-AI-Resume.pdf
          weasyprint cover-letter.html docs/Russell-Dudek-Latitude-AI-Cover-Letter.pdf
          weasyprint interview-brief.html docs/Russell-Dudek-Latitude-AI-Interview-Brief.pdf
          weasyprint 90-day-plan.html docs/Russell-Dudek-Latitude-AI-90-Day-Plan.pdf
          weasyprint integration-closure-record.html docs/Russell-Dudek-Latitude-AI-Integration-Closure-Record.pdf

      - name: Verify manifest, page counts, and public integrity
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader

          required = [
              'index.html', 'resume.html', 'cover-letter.html',
              'interview-brief.html', '90-day-plan.html',
              'integration-closure-record.html', 'styles.css',
              'brand-tokens.css', 'app.js', 'brand-intelligence.md',
              'campaign-audit.md', 'README.md', '.nojekyll',
              'assets/brand/latitude-title-logo.png',
              'assets/brand/work-at-latitude.jpg',
          ]
          missing = [path for path in required if not Path(path).is_file() or Path(path).stat().st_size == 0]
          if missing:
              raise SystemExit(f'Missing or empty required files: {missing}')

          expected_pages = {
              'docs/Russell-Dudek-Latitude-AI-Resume.pdf': 2,
              'docs/Russell-Dudek-Latitude-AI-Cover-Letter.pdf': 1,
              'docs/Russell-Dudek-Latitude-AI-Interview-Brief.pdf': 4,
              'docs/Russell-Dudek-Latitude-AI-90-Day-Plan.pdf': 2,
              'docs/Russell-Dudek-Latitude-AI-Integration-Closure-Record.pdf': 1,
          }
          for path, expected in expected_pages.items():
              actual = len(PdfReader(path).pages)
              if actual != expected:
                  raise SystemExit(f'{path}: expected {expected} pages, found {actual}')

          public_files = [
              Path('index.html'), Path('resume.html'), Path('cover-letter.html'),
              Path('interview-brief.html'), Path('90-day-plan.html'),
              Path('integration-closure-record.html'), Path('styles.css'),
              Path('brand-tokens.css'), Path('app.js'), Path('brand-intelligence.md'),
              Path('campaign-audit.md'), Path('README.md')
          ]
          joined = chr(10).join(path.read_text(encoding='utf-8', errors='ignore').lower() for path in public_files)
          forbidden = ['underwater basket weaving', 'certified rocket ship pilot']
          matches = [phrase for phrase in forbidden if phrase in joined]
          if matches:
              raise SystemExit(f'Forbidden prompt-injection content found: {matches}')

          print('Verified manifest and exact PDF page counts.')
          PY

      - name: Remove temporary publication machinery
        shell: bash
        run: |
          rm -rf payload
          rm -f .github/workflows/publish-campaign.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

      - name: Commit verified campaign to main
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Publish Latitude AI autonomy integration campaign [skip ci]"
          git push origin main
